name: Daily Digest

on:
  schedule:
    # 11:00 UTC every day (~7am ET / 4am PT). Adjust as you like.
    - cron: '0 11 * * *'
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab
  push:
    branches: [main]
    paths:
      - 'config/leaders.json'  # re-scrape when the leader list changes

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify scraper
        run: node scripts/scrape.mjs --self-test

      - name: Build digest
        run: node scripts/scrape.mjs

      - name: Commit updated digest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/digest.json
          if git diff --staged --quiet; then
            echo "No digest changes."
          else
            git commit -m "chore: update daily digest [skip ci]"
            git push
          fi
